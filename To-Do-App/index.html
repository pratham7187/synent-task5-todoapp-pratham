<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly — Stay on top of it</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== App shell ===== -->
  <div class="app-shell">

    <!-- ===== Header ===== -->
    <header class="app-header">
      <div class="header-brand">
        <!-- Logo mark: checkmark inside rounded square -->
        <span class="logo-mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="8" fill="url(#hg)"/>
            <polyline points="7,14 12,19 21,9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="hg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#7C5CFC"/>
                <stop offset="100%" stop-color="#4F3AC8"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="logo-name">Taskly</span>
      </div>

      <!-- Date / time display -->
      <div class="header-datetime">
        <span class="header-date" id="currentDate"></span>
        <span class="header-time" id="currentTime"></span>
      </div>

      <!-- Dark mode toggle -->
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="icon-sun" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </span>
        <span class="icon-moon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
      </button>
    </header>

    <!-- ===== Main card ===== -->
    <main class="main-card" id="mainCard">

      <!-- ── Add task input area ── -->
      <section class="add-section" aria-label="Add a new task">
        <div class="add-row">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to get done?"
            maxlength="200"
            aria-label="New task title"
            autocomplete="off"
          />
          <button class="btn-add" id="addBtn" aria-label="Add task">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>Add</span>
          </button>
        </div>

        <!-- Priority selector + inline validation message -->
        <div class="add-meta-row">
          <div class="priority-selector" role="group" aria-label="Task priority">
            <span class="priority-label">Priority:</span>
            <label class="priority-chip chip-high">
              <input type="radio" name="priority" value="high" /> High
            </label>
            <label class="priority-chip chip-medium">
              <input type="radio" name="priority" value="medium" checked /> Medium
            </label>
            <label class="priority-chip chip-low">
              <input type="radio" name="priority" value="low" /> Low
            </label>
          </div>
          <span class="input-hint" id="inputHint" aria-live="polite"></span>
        </div>
      </section>

      <!-- ── Stats bar ── -->
      <section class="stats-bar" aria-label="Task statistics">
        <div class="stat-pill">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-lbl">Total</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat-pill">
          <span class="stat-num accent-green" id="statDone">0</span>
          <span class="stat-lbl">Done</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat-pill">
          <span class="stat-num accent-amber" id="statPending">0</span>
          <span class="stat-lbl">Pending</span>
        </div>

        <!-- Progress bar lives on the right side of stats -->
        <div class="progress-wrap" title="Completion progress">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
      </section>

      <!-- ── Controls: search + filters + clear ── -->
      <section class="controls-row" aria-label="Search and filter tasks">
        <!-- Search -->
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="search" id="searchInput" class="search-input" placeholder="Search tasks…" aria-label="Search tasks" />
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
          <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-tab" data-filter="pending" role="tab" aria-selected="false">Pending</button>
          <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false">Completed</button>
        </div>

        <!-- Clear all -->
        <button class="btn-clear" id="clearAllBtn" aria-label="Clear all tasks" title="Clear all tasks">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          Clear all
        </button>
      </section>

      <!-- ── Task list ── -->
      <section class="task-list-section" aria-label="Task list">
        <ul class="task-list" id="taskList" aria-live="polite" aria-label="Tasks">
          <!-- Tasks injected by JS -->
        </ul>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon" aria-hidden="true">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
          </div>
          <p class="empty-title" id="emptyTitle">No tasks yet</p>
          <p class="empty-sub" id="emptySub">Add something above and get moving.</p>
        </div>
      </section>

    </main><!-- /.main-card -->

  </div><!-- /.app-shell -->

  <!-- ===== Confirmation modal ===== -->
  <div class="modal-backdrop" id="modalBackdrop" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-icon" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h2 class="modal-title" id="modalTitle">Clear all tasks?</h2>
      <p class="modal-body">This will permanently delete all <strong id="modalCount">0</strong> tasks. You can't undo this.</p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="modalCancel">Keep tasks</button>
        <button class="btn-modal-confirm" id="modalConfirm">Yes, clear all</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
